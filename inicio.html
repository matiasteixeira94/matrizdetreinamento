<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Matriz de Treinamento</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#A23A3E" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Matriz de Treinamento" />
<style>
  html, body { height: 100%; }
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; padding: 48px 24px;
    /* Fundo claro pontilhado — leve, sem foto, deixa logo e título
       carregarem sozinhos o peso visual da tela. */
    background-color: var(--page);
    background-image: radial-gradient(rgba(162, 58, 62, 0.16) 1px, transparent 1px);
    background-size: 15px 15px;
  }
  .hero-logo { width: clamp(120px, 16vw, 180px); height: auto; }
  .hero-title {
    font-family: var(--font-display); font-weight: 800; color: var(--accent);
    font-size: clamp(28px, 5vw, 52px); letter-spacing: 0.01em; text-transform: uppercase;
    text-align: center; text-wrap: balance; margin-top: -8px;
  }
  .hero-subtitle { color: var(--ink-secondary); font-size: 14px; text-align: center; margin-top: -16px; }

  .ugb-grid {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 14px;
    max-width: 1240px; width: 100%;
  }

  @keyframes ugbIn { from { opacity: 0; transform: translateY(14px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .ugb-btn {
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    width: 140px; padding: 18px 10px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-strong);
    background: var(--surface-raised); color: var(--ink); cursor: pointer;
    font-family: var(--font-body); overflow: hidden;
    animation: ugbIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  }
  .ugb-btn::before {
    /* Brilho diagonal que varre o card no hover — puramente decorativo. */
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-120%); transition: transform 0.55s ease;
  }
  .ugb-btn:hover {
    transform: translateY(-5px) scale(1.03);
    border-color: var(--accent);
    box-shadow: 0 16px 32px -12px rgba(30, 14, 12, 0.32);
  }
  .ugb-btn:hover::before { transform: translateX(120%); }
  .ugb-btn:active { transform: translateY(-2px) scale(0.99); }

  .ugb-ring {
    width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(var(--ugb-ring-color, var(--accent)) calc(var(--pct) * 1%), var(--accent-soft) 0);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ugb-btn:hover .ugb-ring { transform: scale(1.1) rotate(8deg); }
  .ugb-ring-inner {
    width: 48px; height: 48px; border-radius: 50%; background: var(--surface-raised);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--ink);
  }
  .ugb-btn-count { font-weight: 500; font-size: 10.5px; color: var(--ink-muted); }
  .ugb-btn-pct { font-size: 10px; font-weight: 600; color: var(--ink-secondary); }

  .hero-todas {
    padding: 10px 22px; border-radius: var(--radius-md);
    border: 1px dashed var(--border-strong); background: transparent; color: var(--ink-secondary);
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }
  .hero-todas:hover { background: var(--accent-soft); color: var(--ink); border-color: var(--accent); transform: translateY(-2px); }
  .hero-todas:active { transform: translateY(0); }
</style>
</head>
<body>
  <div class="hero">
    <img class="hero-logo" src="assets/images/logo-viana-moura.png" alt="Viana &amp; Moura Construções" />
    <h1 class="hero-title">Matriz de Treinamento</h1>
    <p class="hero-subtitle" id="hero-subtitle">Carregando unidades…</p>
    <div class="ugb-grid" id="ugb-grid"></div>
    <button class="hero-todas" id="btn-todas" type="button">Ver todas as UGBs juntas</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    "use strict";
    (async function () {
      const subtitle = document.getElementById("hero-subtitle");
      const grid = document.getElementById("ugb-grid");
      let registros;
      try {
        registros = await MT.loadTreinamentos();
      } catch (e) {
        subtitle.textContent = e.message;
        return;
      }
      subtitle.textContent = "Escolha uma UGB para ver só os treinamentos dela, ou veja todas juntas.";

      const porUgb = {};
      for (const r of registros) {
        const ugb = r.UGB_Colaborador;
        if (!ugb || ugb === "Não tem UGB") continue;
        porUgb[ugb] ??= { total: 0, realizado: 0, atrasado: 0 };
        porUgb[ugb].total++;
        if (r.Status === "Realizado") porUgb[ugb].realizado++;
        if (r.Status === "Atrasado") porUgb[ugb].atrasado++;
      }
      const ugbs = Object.keys(porUgb).sort((a, b) => porUgb[b].total - porUgb[a].total);

      // Anel de progresso colorido pela % de conclusão — vermelho/âmbar/verde
      // dão uma leitura de saúde da UGB antes mesmo de entrar nela.
      function corAnel(pctAtraso) {
        if (pctAtraso >= 40) return "var(--status-critical)";
        if (pctAtraso >= 15) return "var(--status-warning)";
        return "var(--status-good)";
      }

      grid.innerHTML = ugbs.map((ugb, i) => {
        const d = porUgb[ugb];
        const pct = d.total ? Math.round((d.realizado / d.total) * 100) : 0;
        const pctAtraso = d.total ? (d.atrasado / d.total) * 100 : 0;
        return `
        <button class="ugb-btn" type="button" data-ugb="${ugb}" style="animation-delay:${i * 55}ms; --pct:${pct}; --ugb-ring-color:${corAnel(pctAtraso)};">
          <span class="ugb-ring"><span class="ugb-ring-inner">${ugb}</span></span>
          <span class="ugb-btn-count">${MT.fmtInt(d.total)} registros</span>
          <span class="ugb-btn-pct">${pct}% concluído</span>
        </button>`;
      }).join("");

      grid.querySelectorAll(".ugb-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          btn.style.transform = "translateY(-2px) scale(0.96)";
          MT.setUgbAtiva(btn.dataset.ugb);
          window.location.href = "index.html";
        });
      });

      document.getElementById("btn-todas").addEventListener("click", () => {
        MT.limparUgbAtiva();
        window.location.href = "index.html";
      });
    })();
  </script>
</body>
</html>
