<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestão de Matriz de Treinamento</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#A23A3E" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Matriz de Treinamento" />
<style>
  html, body { height: 100%; }
  .hero {
    position: relative; min-height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .hero-bg {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center;
  }
  .hero-overlay {
    /* Bem mais opaco que um overlay comum — a imagem de fundo já carrega a
       marca "viana e moura" embutida (canto superior direito) e, sem isso,
       ela brigava visualmente com o título centralizado por cima. */
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(18, 8, 8, 0.68) 0%, rgba(24, 10, 10, 0.74) 55%, rgba(24, 10, 10, 0.82) 100%);
  }
  .hero-wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; max-width: 720px; }
  .hero-title {
    font-family: var(--font-display); font-weight: 600; color: #FBF1E3;
    font-size: clamp(26px, 4.2vw, 40px); text-align: center; text-wrap: balance;
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
  }
  .hero-subtitle { color: #F1DAD2; font-size: 14px; text-align: center; margin-top: -14px; text-shadow: 0 1px 8px rgba(0,0,0,0.4); }
  .hero-card {
    width: 100%; background: var(--surface-raised); border-radius: 18px;
    box-shadow: 0 24px 60px rgba(30, 14, 12, 0.35); padding: 30px 28px;
  }
  .hero-card-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); text-align: center; margin-bottom: 16px; }
  .ugb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 560px) { .ugb-grid { grid-template-columns: repeat(2, 1fr); } }
  .ugb-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    padding: 18px 10px; border-radius: var(--radius-md); border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--ink); cursor: pointer; transition: all 0.15s ease;
    font-family: var(--font-display); font-weight: 600;
  }
  .ugb-btn:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); transform: translateY(-2px); }
  .ugb-btn-code { font-size: 18px; }
  .ugb-btn-count { font-family: var(--font-body); font-weight: 500; font-size: 10.5px; color: var(--ink-muted); }
  .ugb-btn:hover .ugb-btn-count { color: var(--accent-ink); opacity: 0.85; }
  .hero-todas {
    width: 100%; margin-top: 14px; padding: 12px; border-radius: var(--radius-md);
    border: 1px dashed var(--border-strong); background: transparent; color: var(--ink-secondary);
    font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  }
  .hero-todas:hover { background: var(--accent-soft); color: var(--ink); }
</style>
</head>
<body>
  <div class="hero">
    <img class="hero-bg" src="assets/images/capa-viana-moura.png" alt="" aria-hidden="true" />
    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="hero-wrap">
      <h1 class="hero-title">Gestão de Matriz de Treinamento</h1>
      <p class="hero-subtitle" id="hero-subtitle">Carregando unidades…</p>
      <div class="hero-card">
        <div class="hero-card-label">Selecione a UGB</div>
        <div class="ugb-grid" id="ugb-grid"></div>
        <button class="hero-todas" id="btn-todas" type="button">Ver todas as UGBs juntas</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    "use strict";
    (async function () {
      const subtitle = document.getElementById("hero-subtitle");
      const grid = document.getElementById("ugb-grid");
      let registros;
      try {
        registros = await MT.loadTreinamentos();
      } catch (e) {
        subtitle.textContent = e.message;
        return;
      }
      subtitle.textContent = "Escolha uma UGB para ver só os treinamentos dela, ou veja todas juntas.";

      const contagem = {};
      for (const r of registros) {
        const ugb = r.UGB_Colaborador;
        if (!ugb || ugb === "Não tem UGB") continue;
        contagem[ugb] = (contagem[ugb] || 0) + 1;
      }
      const ugbs = Object.keys(contagem).sort((a, b) => contagem[b] - contagem[a]);

      grid.innerHTML = ugbs.map((ugb) => `
        <button class="ugb-btn" type="button" data-ugb="${ugb}">
          <span class="ugb-btn-code">${ugb}</span>
          <span class="ugb-btn-count">${MT.fmtInt(contagem[ugb])} registros</span>
        </button>
      `).join("");

      grid.querySelectorAll(".ugb-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          MT.setUgbAtiva(btn.dataset.ugb);
          window.location.href = "index.html";
        });
      });

      document.getElementById("btn-todas").addEventListener("click", () => {
        MT.limparUgbAtiva();
        window.location.href = "index.html";
      });
    })();
  </script>
</body>
</html>
